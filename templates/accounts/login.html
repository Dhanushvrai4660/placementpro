{% extends 'base.html' %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 220px);">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card border-0" style="background: rgba(255, 255, 255, 0.16); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); box-shadow: 0 20px 45px rgba(0,0,0,0.28); color: #fff;">
      <div class="text-center mb-3">
        <h1 class="fw-bold mb-1" style="font-size: 2rem;">Welcome Back</h1>
        <p class="mb-0" style="color: rgba(255,255,255,0.86);">Sign in to continue to PlacementPro</p>
      </div>
      <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <div class="d-grid gap-2 mt-2">
          <button class="btn btn-gradient py-2" type="submit">Login</button>
          <a class="btn btn-outline-light rounded-3" href="{% url 'accounts:register' %}">Create account</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
